name: Scan App Installations

on:
  schedule:
    - cron: "0 3 * * 3"
  workflow_dispatch:
    inputs:
      app_ids:
        description: Specific app IDs to scan (comma-separated, or "all")
        required: false
        default: all
      max_apps:
        description: Maximum number of apps to scan
        required: false
        default: "20"
      trigger_source:
        description: Source that triggered this workflow
        required: false
        default: manual

permissions:
  contents: read

concurrency:
  group: scan-apps
  cancel-in-progress: false

jobs:
  select:
    name: Select apps
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      matrix: ${{ steps.select.outputs.matrix }}
      app_count: ${{ steps.select.outputs.app_count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "26.5.0"
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Select least-recently-scanned apps
        id: select
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APP_IDS: ${{ github.event.inputs.app_ids || 'all' }}
          MAX_APPS: ${{ github.event.inputs.max_apps || '20' }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const { createClient } = require('@supabase/supabase-js');

          const url = process.env.SUPABASE_URL;
          const key = process.env.SUPABASE_SERVICE_KEY;
          if (!url || !key) throw new Error('Supabase credentials are required');

          const maxApps = Math.max(1, Math.min(50, Number.parseInt(process.env.MAX_APPS || '10', 10)));
          const requested = (process.env.APP_IDS || 'all').split(',').map(v => v.trim()).filter(Boolean);
          const specific = requested.length > 0 && requested[0] !== 'all';
          const idPattern = /^[A-Za-z0-9][A-Za-z0-9._-]*\.[A-Za-z0-9][A-Za-z0-9._+-]*$/;
          if (specific && requested.some(id => !idPattern.test(id))) throw new Error('One or more app IDs are invalid');

          const supabase = createClient(url, key);
          async function main() {
            let query = supabase
              .from('curated_apps')
              .select('winget_id, name, publisher, latest_version, popularity_rank')
              .not('latest_version', 'is', null);
            if (specific) query = query.in('winget_id', requested);
            else query = query.order('popularity_rank', { ascending: true, nullsFirst: false }).limit(Math.max(500, maxApps * 20));
            const { data: candidates, error } = await query;
            if (error) throw error;
            if (!candidates?.length) throw new Error('No matching apps were found');

            const lastScanned = new Map();
            for (let i = 0; i < candidates.length; i += 100) {
              const ids = candidates.slice(i, i + 100).map(app => app.winget_id);
              const { data, error: scanError } = await supabase
                .from('installation_snapshots')
                .select('winget_id, scanned_at')
                .in('winget_id', ids)
                .order('scanned_at', { ascending: false });
              if (scanError) throw scanError;
              for (const row of data || []) if (!lastScanned.has(row.winget_id)) lastScanned.set(row.winget_id, row.scanned_at);
            }

            candidates.sort((a, b) => {
              const aTime = lastScanned.has(a.winget_id) ? Date.parse(lastScanned.get(a.winget_id)) : 0;
              const bTime = lastScanned.has(b.winget_id) ? Date.parse(lastScanned.get(b.winget_id)) : 0;
              return aTime - bTime || (a.popularity_rank ?? Number.MAX_SAFE_INTEGER) - (b.popularity_rank ?? Number.MAX_SAFE_INTEGER);
            });
            const apps = candidates.slice(0, maxApps).map(app => ({
              winget_id: app.winget_id,
              expected_version: app.latest_version,
            }));
            const matrix = JSON.stringify({ include: apps });
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `matrix=${matrix}\napp_count=${apps.length}\n`);
            console.log(`Selected ${apps.length} app(s): ${apps.map(a => a.winget_id).join(', ')}`);
          }
          main().catch(error => { console.error(error); process.exit(1); });
          NODE

  scan:
    name: Scan ${{ matrix.winget_id }}
    needs: select
    if: needs.select.outputs.app_count != '0'
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix: ${{ fromJson(needs.select.outputs.matrix) }}
    runs-on: windows-2025
    timeout-minutes: 35
    permissions:
      contents: read
    steps:
      - name: Checkout scanner code without credentials
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Ensure WinGet is available
        shell: pwsh
        run: |
          if (-not (Get-Command winget -ErrorAction SilentlyContinue)) {
            throw 'WinGet is not available on this runner image'
          }
          winget --version

      - name: Scan app in isolated runner
        id: scan
        continue-on-error: true
        shell: pwsh
        env:
          WINGET_ID: ${{ matrix.winget_id }}
          EXPECTED_VERSION: ${{ matrix.expected_version }}
          APP_TIMEOUT_SECONDS: "900"
        run: .github/scripts/scan-app.ps1 -WingetId $env:WINGET_ID -ExpectedVersion $env:EXPECTED_VERSION -OutputPath scan-result.json

      - name: Upload scan result
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scan-result-${{ matrix.winget_id }}
          path: scan-result.json
          if-no-files-found: error
          retention-days: 2

      - name: Propagate scanner failure
        if: steps.scan.outcome == 'failure'
        shell: pwsh
        run: throw 'Scanner failed; the diagnostic result artifact was preserved'

  upload:
    name: Validate and upload results
    needs: [select, scan]
    if: always() && needs.select.result == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "26.5.0"
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Download scan results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: scan-result-*
          path: scan-results

      - name: Upload validated results to Supabase
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          EXPECTED_COUNT: ${{ needs.select.outputs.app_count }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const { createClient } = require('@supabase/supabase-js');
          const url = process.env.SUPABASE_URL;
          const key = process.env.SUPABASE_SERVICE_KEY;
          if (!url || !key) throw new Error('Supabase credentials are required');

          const files = fs.existsSync('scan-results')
            ? fs.readdirSync('scan-results', { recursive: true }).filter(name => name.endsWith('.json'))
            : [];
          const results = files.map(file => JSON.parse(fs.readFileSync(path.join('scan-results', file), 'utf8')));
          const expected = Number.parseInt(process.env.EXPECTED_COUNT || '0', 10);
          if (results.length !== expected) throw new Error(`Expected ${expected} result artifacts, found ${results.length}`);

          const supabase = createClient(url, key);
          async function main() {
            let uploaded = 0;
            for (const result of results) {
              if (!result.winget_id || !result.version || !['completed', 'failed', 'skipped'].includes(result.status)) {
                throw new Error(`Invalid scan result: ${JSON.stringify(result).slice(0, 300)}`);
              }
              const record = {
                winget_id: result.winget_id,
                version: result.version,
                scanned_at: result.scanned_at,
                scan_duration_seconds: result.scan_duration_seconds,
                scan_status: result.status,
                scan_error: result.error,
                registry_changes: result.registry_changes,
                file_changes: result.file_changes,
                shortcuts_created: result.shortcuts_created,
                services_created: result.services_created,
                install_path: result.install_path,
                uninstall_string: result.uninstall_string,
                quiet_uninstall_string: result.quiet_uninstall_string,
                installed_size_bytes: result.installed_size_bytes,
                os_version: result.os_version,
                architecture: result.architecture,
                updated_at: new Date().toISOString(),
              };
              const { error } = await supabase.from('installation_snapshots').upsert(record, { onConflict: 'winget_id,version' });
              if (error) throw error;
              uploaded++;
            }

            const completed = results.filter(r => r.status === 'completed').length;
            const failed = results.filter(r => r.status === 'failed').length;
            const skipped = results.filter(r => r.status === 'skipped').length;
            const status = failed === 0 && skipped === 0 ? 'success' : completed > 0 || skipped > 0 ? 'partial' : 'failed';
            const { error: statusError } = await supabase.from('curated_sync_status').upsert({
              id: 'scan-apps',
              last_run_completed_at: new Date().toISOString(),
              last_run_status: status,
              items_processed: completed,
              error_message: failed || skipped ? `${failed} failed, ${skipped} skipped` : null,
              metadata: { total: results.length, uploaded, completed, failed, skipped },
              updated_at: new Date().toISOString(),
            });
            if (statusError) throw statusError;

            fs.writeFileSync('scan-summary.json', JSON.stringify({ completed, failed, skipped, results }, null, 2));
            if (failed > 0) process.exitCode = 1;
          }
          main().catch(error => { console.error(error); process.exit(1); });
          NODE

      - name: Write workflow summary
        if: always() && hashFiles('scan-summary.json') != ''
        run: |
          echo "## App Scan Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Completed:** $(jq -r .completed scan-summary.json)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Failed:** $(jq -r .failed scan-summary.json)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Skipped:** $(jq -r .skipped scan-summary.json)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          jq -r '.results[] | "- `\(.winget_id)` — \(.status)\(if .error then ": " + .error else "" end)"' scan-summary.json >> "$GITHUB_STEP_SUMMARY"

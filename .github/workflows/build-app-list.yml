name: Build Curated App List

on:
  schedule:
    # Run weekly on Sundays at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Maximum number of apps to import (0 = all)'
        required: false
        default: '0'
      force_refresh:
        description: 'Force refresh all apps (update even if unchanged)'
        required: false
        default: 'false'
        type: boolean

# Prevent concurrent runs that could cause database conflicts
concurrency:
  group: curated-apps-pipeline
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  WINGET_INDEX_URL: 'https://raw.githubusercontent.com/svrooij/winget-pkgs-index/main/index.v2.json'

permissions:
  contents: read

jobs:
  build-app-list:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        # Use npm install (not npm ci) so Sharp's platform-specific transitive
        # deps (@emnapi/runtime, @emnapi/core, etc.) resolve correctly even
        # when package-lock.json was generated on a different OS/CPU.
        run: npm install --no-audit --no-fund

      - name: Fetch winget package index
        id: fetch
        run: |
          echo "Fetching winget-pkgs-index from svrooij..."
          curl -sL "$WINGET_INDEX_URL" -o winget-index.json

          # Validate JSON
          if ! jq empty winget-index.json 2>/dev/null; then
            echo "ERROR: Invalid JSON received"
            exit 1
          fi

          TOTAL=$(jq 'length' winget-index.json)
          echo "Fetched index with $TOTAL packages"
          echo "total_packages=$TOTAL" >> $GITHUB_OUTPUT

      - name: Import packages to Supabase
        id: import
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          IMPORT_LIMIT: ${{ github.event.inputs.limit || '0' }}
          FORCE_REFRESH: ${{ github.event.inputs.force_refresh || 'false' }}
        run: |
          node << 'EOF'
          const fs = require('fs');
          const { createClient } = require('@supabase/supabase-js');

          const supabaseUrl = process.env.SUPABASE_URL;
          const supabaseKey = process.env.SUPABASE_SERVICE_KEY;

          if (!supabaseUrl || !supabaseKey) {
            console.log('Supabase credentials not configured, skipping sync');
            process.exit(0);
          }

          const supabase = createClient(supabaseUrl, supabaseKey);

          async function importPackages() {
            const importLimit = parseInt(process.env.IMPORT_LIMIT || '0', 10);
            const forceRefresh = process.env.FORCE_REFRESH === 'true';

            // Update sync status to running
            await supabase.from('curated_sync_status').upsert({
              id: 'build-app-list',
              last_run_started_at: new Date().toISOString(),
              last_run_status: 'running',
              updated_at: new Date().toISOString()
            });

            // Load winget index
            const rawIndex = fs.readFileSync('winget-index.json', 'utf8');
            let packages = JSON.parse(rawIndex);

            console.log(`Loaded ${packages.length} packages from winget index`);

            // Apply limit if specified (for testing)
            if (importLimit > 0 && packages.length > importLimit) {
              console.log(`Limiting to ${importLimit} packages (for testing)`);
              packages = packages.slice(0, importLimit);
            }

            // Load exclusion list (winget IDs that must never enter curated_apps).
            // Maintained in public.curated_excluded_apps. Add a row there to ban
            // a package permanently (e.g. SourceForge installers that 403 in CI).
            const excludedIds = new Set();
            {
              const pageSize = 1000;
              for (let from = 0; ; from += pageSize) {
                const { data, error } = await supabase
                  .from('curated_excluded_apps')
                  .select('winget_id')
                  .range(from, from + pageSize - 1);
                if (error) {
                  throw new Error(`Failed to load curated_excluded_apps: ${error.message}`);
                }
                if (!data || data.length === 0) break;
                for (const row of data) excludedIds.add(row.winget_id);
                if (data.length < pageSize) break;
              }
            }
            console.log(`Loaded ${excludedIds.size} excluded winget IDs`);

            // ---------------------------------------------------------------
            // Locale detection for language variant grouping
            // Known locale codes (ISO 639-1 + common BCP 47 subtags)
            // ---------------------------------------------------------------
            const LOCALE_CODES = new Set([
              'aa','ab','af','ak','am','an','ar','as','ast','av','ay','az',
              'ba','be','bg','bm','bn','bo','br','bs',
              'ca','ce','cak','ch','co','cr','cs','cu','cv','cy',
              'da','de','dsb','dv','dz',
              'ee','el','en-CA','en-GB','en-US','eo','es-AR','es-CL','es-ES','es-MX',
              'et','eu',
              'fa','ff','fi','fj','fo','fr','fur','fy-NL',
              'ga-IE','gd','gl','gn','gu-IN',
              'ha','he','hi-IN','ho','hr','hsb','ht','hu','hy-AM',
              'ia','id','ig','ii','ik','io','is','it',
              'ja','jv',
              'ka','kab','kg','ki','kk','kl','km','kn','ko','ks','ku','kv','kw','ky',
              'la','lb','lg','li','lij','ln','lo','lt','lu','lv',
              'mg','mh','mi','mk','ml','mn','mr','ms','mt','my',
              'na','nb-NO','nd','ne-NP','ng','nl','nn-NO','no','nr','nv','ny',
              'oc','oj','om','or','os',
              'pa-IN','pi','pl','ps','pt-BR','pt-PT',
              'qu',
              'rm','rn','ro','ru','rw',
              'sa','sc','sco','sd','se','sg','si','sk','sl','sm','sn','so','son','sq','sr','ss','st','su','sv-SE','sw','szl',
              'ta','te','tg','th','ti','tk','tl','tn','to','tr','trs','ts','tt','tw','ty',
              'ug','uk','ur','uz',
              'vi','vo',
              'wa','wo',
              'xh',
              'yi','yo',
              'za','zh-CN','zh-TW','zu'
            ]);

            // Whitelist of parent package IDs eligible for locale variant grouping.
            // Add more entries here as needed (e.g., 'LibreOffice.LibreOffice').
            const LOCALE_VARIANT_PARENTS = new Set([
              'Mozilla.Firefox',
            ]);

            function detectLocaleVariant(packageId) {
              const parts = packageId.split('.');
              if (parts.length < 3) return null;

              const lastPart = parts[parts.length - 1];
              const lastTwoParts = parts.length >= 4
                ? parts[parts.length - 2] + '-' + lastPart
                : null;

              // Check compound locale first (e.g., "es-ES", "pt-BR", "fy-NL")
              if (lastTwoParts && LOCALE_CODES.has(lastTwoParts)) {
                const parentId = parts.slice(0, -2).join('.');
                if (!LOCALE_VARIANT_PARENTS.has(parentId)) return null;
                return { parentId, locale: lastTwoParts };
              }

              // Check single locale code (e.g., "de", "fr", "ja")
              // Only match if the segment is lowercase (BCP 47 convention).
              if (lastPart === lastPart.toLowerCase() && LOCALE_CODES.has(lastPart)) {
                const parentId = parts.slice(0, -1).join('.');
                if (!LOCALE_VARIANT_PARENTS.has(parentId)) return null;
                return { parentId, locale: lastPart };
              }

              return null;
            }

            // Transform packages to our schema
            // Index v2 format: { Name, PackageId, Version, Tags, LastUpdate }

            // First pass: build a set of all package IDs so we can validate parents
            const allPackageIds = new Set(
              packages.map(pkg => pkg.PackageId || pkg.PackageIdentifier || '').filter(Boolean)
            );

            const appsToUpsert = packages.map(pkg => {
              // Extract publisher from PackageId (first part before .)
              const packageId = pkg.PackageId || pkg.PackageIdentifier || '';
              const parts = packageId.split('.');
              const publisher = parts[0] || 'Unknown';

              // Detect locale variant
              const localeInfo = detectLocaleVariant(packageId);
              // Only mark as variant if the parent package also exists in the index
              const isVariant = localeInfo !== null && allPackageIds.has(localeInfo.parentId);

              return {
                winget_id: packageId,
                name: pkg.Name || pkg.PackageName || packageId,
                publisher: publisher,
                latest_version: pkg.Version || null,
                tags: pkg.Tags || [],
                winget_last_update: pkg.LastUpdate || null,
                is_verified: true, // Source is authoritative (winget-pkgs)
                is_winget_verified: true,
                parent_winget_id: isVariant ? localeInfo.parentId : null,
                locale_code: isVariant ? localeInfo.locale : null,
                is_locale_variant: isVariant,
                updated_at: new Date().toISOString()
              };
            }).filter(app => app.winget_id); // Filter out any entries without ID

            // Drop any packages on the exclusion list before upsert.
            const preExcludeCount = appsToUpsert.length;
            const filteredAppsToUpsert = appsToUpsert.filter(a => !excludedIds.has(a.winget_id));
            const excludedFromImport = preExcludeCount - filteredAppsToUpsert.length;
            if (excludedFromImport > 0) {
              console.log(`Excluded ${excludedFromImport} packages via curated_excluded_apps`);
            }

            const variantCount = filteredAppsToUpsert.filter(a => a.is_locale_variant).length;
            console.log(`Prepared ${filteredAppsToUpsert.length} apps for upsert (${variantCount} locale variants detected)`);

            // Upsert in batches to handle scale
            const batchSize = 500;
            let totalUpserted = 0;
            let errors = 0;

            let purgedExisting = 0;
            let purgedRecased = 0;
            try {
              for (let i = 0; i < filteredAppsToUpsert.length; i += batchSize) {
                const batch = filteredAppsToUpsert.slice(i, i + batchSize);

                const { error } = await supabase
                  .from('curated_apps')
                  .upsert(batch, {
                    onConflict: 'winget_id',
                    ignoreDuplicates: false
                  });

                if (error) {
                  console.error(`Batch ${Math.floor(i / batchSize) + 1} failed:`, error.message);
                  errors++;
                  // Continue with next batch
                } else {
                  totalUpserted += batch.length;
                }

                // Progress logging every 10 batches
                if ((i / batchSize) % 10 === 0) {
                  console.log(`Progress: ${Math.min(i + batchSize, filteredAppsToUpsert.length)}/${filteredAppsToUpsert.length}`);
                }

                // Small delay between batches to avoid rate limiting
                if (i + batchSize < filteredAppsToUpsert.length) {
                  await new Promise(r => setTimeout(r, 100));
                }
              }

              // Purge any curated_apps rows whose winget_id is now excluded.
              // Done in chunks because Supabase .in() has a URL-length limit.
              if (excludedIds.size > 0) {
                const excludedArr = Array.from(excludedIds);
                const purgeChunkSize = 200;
                for (let i = 0; i < excludedArr.length; i += purgeChunkSize) {
                  const chunk = excludedArr.slice(i, i + purgeChunkSize);
                  const { error: purgeError, count } = await supabase
                    .from('curated_apps')
                    .delete({ count: 'exact' })
                    .in('winget_id', chunk);
                  if (purgeError) {
                    console.error(`Purge chunk ${Math.floor(i / purgeChunkSize) + 1} failed:`, purgeError.message);
                    errors++;
                  } else {
                    purgedExisting += count || 0;
                  }
                }
                if (purgedExisting > 0) {
                  console.log(`Purged ${purgedExisting} previously-existing rows that are now excluded`);
                }
              }

              // Self-heal winget publisher re-casings: when the index renames
              // an ID's casing (e.g. NetSDK.S3Browser -> Netsdk.S3Browser) the
              // upsert above creates the new-cased row, but the old-cased row
              // would linger forever - its GitHub manifest paths 404
              // case-sensitively so it can never sync again, it duplicates the
              // app in search, and re-extracting its icon creates
              // case-colliding directories under public/icons. Detect rows
              // whose winget_id matches an imported ID case-insensitively but
              // not exactly, carry over fields the new row is missing (icons
              // and categories are expensive to regenerate), then delete the
              // dead row and its version history. Rows that merely
              // disappeared from the index are never touched.
              {
                const importedIds = new Set(filteredAppsToUpsert.map(a => a.winget_id));
                const foldedToCanonical = new Map();
                const ambiguousFolded = new Set();
                for (const id of importedIds) {
                  const folded = id.toLowerCase();
                  if (foldedToCanonical.has(folded) && foldedToCanonical.get(folded) !== id) {
                    // The index itself contains two casings - never purge then
                    ambiguousFolded.add(folded);
                  }
                  foldedToCanonical.set(folded, id);
                }

                const recased = [];
                const pageSize = 1000;
                for (let from = 0; ; from += pageSize) {
                  const { data, error } = await supabase
                    .from('curated_apps')
                    .select('winget_id, icon_path, has_icon, icon_source, description, category')
                    .order('winget_id')
                    .range(from, from + pageSize - 1);
                  if (error) {
                    console.error('Re-case scan failed:', error.message);
                    errors++;
                    recased.length = 0;
                    break;
                  }
                  if (!data || data.length === 0) break;
                  for (const row of data) {
                    const folded = row.winget_id.toLowerCase();
                    const canonical = foldedToCanonical.get(folded);
                    if (canonical && canonical !== row.winget_id && !ambiguousFolded.has(folded)) {
                      recased.push({ row, canonical });
                    }
                  }
                  if (data.length < pageSize) break;
                }

                for (const { row, canonical } of recased) {
                  const { data: canonicalRow, error: canonicalError } = await supabase
                    .from('curated_apps')
                    .select('winget_id, icon_path, has_icon, description, category')
                    .eq('winget_id', canonical)
                    .single();
                  if (canonicalError || !canonicalRow) {
                    console.error(`Re-case purge skipped for ${row.winget_id}: canonical row ${canonical} not readable`);
                    errors++;
                    continue;
                  }

                  const carryOver = {};
                  if (!canonicalRow.icon_path && row.icon_path) {
                    carryOver.icon_path = row.icon_path;
                    carryOver.has_icon = row.has_icon;
                    carryOver.icon_source = row.icon_source;
                  }
                  if (!canonicalRow.description && row.description) {
                    carryOver.description = row.description;
                  }
                  if (!canonicalRow.category && row.category) {
                    carryOver.category = row.category;
                  }
                  if (Object.keys(carryOver).length > 0) {
                    carryOver.updated_at = new Date().toISOString();
                    const { error: carryError } = await supabase
                      .from('curated_apps')
                      .update(carryOver)
                      .eq('winget_id', canonical);
                    if (carryError) {
                      console.error(`Re-case carry-over failed for ${canonical}:`, carryError.message);
                      errors++;
                      // Keep the dead row rather than losing its data
                      continue;
                    }
                  }

                  const { error: vhError } = await supabase
                    .from('version_history')
                    .delete()
                    .eq('winget_id', row.winget_id);
                  if (vhError) {
                    console.error(`Re-case version_history delete failed for ${row.winget_id}:`, vhError.message);
                    errors++;
                    continue;
                  }

                  const { error: deleteError } = await supabase
                    .from('curated_apps')
                    .delete()
                    .eq('winget_id', row.winget_id);
                  if (deleteError) {
                    console.error(`Re-case delete failed for ${row.winget_id}:`, deleteError.message);
                    errors++;
                    continue;
                  }

                  purgedRecased++;
                  console.log(`Purged re-cased ID: ${row.winget_id} -> ${canonical}`);
                }
              }

              // Icon inheritance: copy parent icon_path to locale variants
              if (variantCount > 0) {
                const { data: iconCount, error: iconError } = await supabase.rpc('inherit_parent_icons');
                if (iconError) {
                  console.log('Icon inheritance: skipped (function may not exist yet):', iconError.message);
                } else {
                  console.log(`Icon inheritance: updated ${iconCount || 0} variant icons from parent apps`);
                }
              }

              // Update sync status to success
              await supabase.from('curated_sync_status').upsert({
                id: 'build-app-list',
                last_run_completed_at: new Date().toISOString(),
                last_run_status: errors > 0 && totalUpserted === 0 ? 'failed' : 'success',
                items_processed: totalUpserted,
                error_message: errors > 0 ? `${errors} batches failed` : null,
                metadata: {
                  source: 'winget-pkgs-index',
                  total_packages: packages.length,
                  upserted: totalUpserted,
                  excluded_from_import: excludedFromImport,
                  purged_existing: purgedExisting,
                  purged_recased: purgedRecased,
                  excluded_total: excludedIds.size,
                  batch_errors: errors
                },
                updated_at: new Date().toISOString()
              });

              console.log(`\nImport complete:`);
              console.log(`  - Total packages in index: ${packages.length}`);
              console.log(`  - Successfully upserted: ${totalUpserted}`);
              console.log(`  - Excluded from import: ${excludedFromImport}`);
              console.log(`  - Purged previously-existing rows: ${purgedExisting}`);
              console.log(`  - Purged re-cased rows: ${purgedRecased}`);
              console.log(`  - Locale variants detected: ${variantCount}`);
              console.log(`  - Batch errors: ${errors}`);

              // Output stats for workflow
              fs.writeFileSync('./import-stats.json', JSON.stringify({
                total: packages.length,
                upserted: totalUpserted,
                excluded_from_import: excludedFromImport,
                purged_existing: purgedExisting,
                purged_recased: purgedRecased,
                excluded_total: excludedIds.size,
                locale_variants: variantCount,
                errors: errors
              }));

            } catch (error) {
              // Update sync status to failed
              await supabase.from('curated_sync_status').upsert({
                id: 'build-app-list',
                last_run_status: 'failed',
                error_message: error.message,
                updated_at: new Date().toISOString()
              });

              console.error('Import failed:', error.message);
              process.exit(1);
            }
          }

          importPackages().then(() => {
            process.exit(0);
          }).catch((err) => {
            console.error('Unexpected error:', err);
            process.exit(1);
          });
          EOF

          echo "import_complete=true" >> $GITHUB_OUTPUT

      - name: Create summary
        run: |
          if [ -f import-stats.json ]; then
            TOTAL=$(jq -r '.total' import-stats.json)
            UPSERTED=$(jq -r '.upserted' import-stats.json)
            VARIANTS=$(jq -r '.locale_variants // 0' import-stats.json)
            EXCLUDED_IMPORT=$(jq -r '.excluded_from_import // 0' import-stats.json)
            PURGED=$(jq -r '.purged_existing // 0' import-stats.json)
            PURGED_RECASED=$(jq -r '.purged_recased // 0' import-stats.json)
            EXCLUDED_TOTAL=$(jq -r '.excluded_total // 0' import-stats.json)
            ERRORS=$(jq -r '.errors' import-stats.json)

            echo "## Curated App List Build Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Source: winget-pkgs-index" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- **Total packages in index:** $TOTAL" >> $GITHUB_STEP_SUMMARY
            echo "- **Successfully imported:** $UPSERTED" >> $GITHUB_STEP_SUMMARY
            echo "- **Excluded from import:** $EXCLUDED_IMPORT (denylist size: $EXCLUDED_TOTAL)" >> $GITHUB_STEP_SUMMARY
            echo "- **Purged existing rows:** $PURGED" >> $GITHUB_STEP_SUMMARY
            echo "- **Purged re-cased rows:** $PURGED_RECASED" >> $GITHUB_STEP_SUMMARY
            echo "- **Locale variants detected:** $VARIANTS" >> $GITHUB_STEP_SUMMARY
            echo "- **Batch errors:** $ERRORS" >> $GITHUB_STEP_SUMMARY
            echo "- **Generated at:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "This workflow now sources directly from the winget-pkgs-index maintained by svrooij, which is updated every 4 hours from the official Microsoft winget-pkgs repository." >> $GITHUB_STEP_SUMMARY
          fi

version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: Europe/Berlin
    groups:
      npm-development:
        dependency-type: development
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /packager
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Europe/Berlin

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:45"
      timezone: Europe/Berlin

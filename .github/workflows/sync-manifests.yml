name: Sync Winget Manifests

on:
  schedule:
    # Run daily at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      app_ids:
        description: 'Specific app IDs to sync (comma-separated, or "all")'
        required: false
        default: "all"
      limit:
        description: "Total maximum apps to process (0 = all)"
        required: false
        default: "0"
        type: string
      mode:
        description: "Sync mode"
        required: false
        default: "all"
        type: choice
        options:
          - all # All apps (full refresh)
          - incremental # Only apps missing version data
          - new_only # Only apps without any version_history
      force_refresh:
        description: "Force refresh even if version unchanged"
        required: false
        default: false
        type: boolean

# Prevent concurrent workflow runs (matrix jobs within a run are fine)
concurrency:
  group: curated-apps-pipeline
  cancel-in-progress: false

env:
  NODE_VERSION: "26.5.0"
  GITHUB_RAW_BASE: "https://raw.githubusercontent.com/microsoft/winget-pkgs/master/manifests"

permissions:
  contents: read

jobs:
  # ── Job 1: Plan ──────────────────────────────────────────────────────
  # Fast job that counts apps and generates a matrix of 500-app shards.
  # Uses native fetch (Node 22) so no npm ci is needed.
  plan:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
      expected_shards: ${{ steps.generate.outputs.expected_shards }}
    timeout-minutes: 10

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Generate sync matrix
        id: generate
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APP_IDS: ${{ github.event.inputs.app_ids || 'all' }}
          APP_LIMIT: ${{ github.event.inputs.limit || '0' }}
          SYNC_MODE: ${{ github.event.inputs.mode || 'all' }}
        run: |
          node << 'PLANEOF'
          const fs = require('fs');
          const SUPABASE_URL = process.env.SUPABASE_URL;
          const SUPABASE_KEY = process.env.SUPABASE_SERVICE_KEY;
          const appIds = process.env.APP_IDS;
          const appLimit = parseInt(process.env.APP_LIMIT || '0', 10);
          const syncMode = process.env.SYNC_MODE || 'all';
          const CHUNK_SIZE = 500;
          const idPattern = /^[A-Za-z0-9][A-Za-z0-9._-]*\.[A-Za-z0-9][A-Za-z0-9._+-]*$/;

          async function run() {
            if (!SUPABASE_URL || !SUPABASE_KEY) throw new Error('Supabase credentials are required');
            let total = 0;

            if (appIds !== 'all') {
              const requestedIds = [...new Set(appIds.split(',').map(id => id.trim()).filter(Boolean))];
              if (requestedIds.length === 0 || requestedIds.some(id => !idPattern.test(id))) {
                throw new Error('One or more requested WinGet IDs are invalid');
              }
              total = requestedIds.length;
            } else {
              // Query count via Supabase REST API (no npm needed)
              let url = `${SUPABASE_URL}/rest/v1/curated_apps?select=winget_id`;
              const res = await fetch(url, {
                headers: {
                  'apikey': SUPABASE_KEY,
                  'Authorization': `Bearer ${SUPABASE_KEY}`,
                  'Prefer': 'count=exact',
                  'Range': '0-0'
                }
              });

              if (!res.ok) {
                throw new Error(`Supabase count query failed: ${res.status} ${await res.text()}`);
              }

              const contentRange = res.headers.get('content-range');
              if (contentRange && contentRange.includes('/')) {
                total = parseInt(contentRange.split('/')[1], 10);
              }
              if (!Number.isFinite(total)) throw new Error('Supabase did not return a valid catalog count');
            }

            // Apply total limit
            if (appLimit > 0 && total > appLimit) {
              total = appLimit;
            }

            // Generate matrix chunks
            const chunks = [];
            if (appIds !== 'all') {
              // Single shard for specific IDs
              chunks.push({ shard: 1, offset: 0, chunk_size: total, total_shards: 1 });
            } else {
              for (let offset = 0; offset < total; offset += CHUNK_SIZE) {
                const size = Math.min(CHUNK_SIZE, total - offset);
                chunks.push({
                  shard: chunks.length + 1,
                  offset,
                  chunk_size: size,
                  total_shards: Math.ceil(total / CHUNK_SIZE)
                });
              }
            }

            // GitHub Actions requires at least one matrix entry
            if (chunks.length === 0) {
              chunks.push({ shard: 1, offset: 0, chunk_size: 0, total_shards: 1 });
            }

            const matrix = JSON.stringify({ include: chunks });

            console.log(`Total apps: ${total}`);
            console.log(`Chunk size: ${CHUNK_SIZE}`);
            console.log(`Shards: ${chunks.length}`);
            console.log(`Matrix: ${matrix}`);

            fs.appendFileSync(process.env.GITHUB_OUTPUT, `matrix=${matrix}\n`);
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `expected_shards=${chunks.length}\n`);

            // Mark sync as running
            const statusResponse = await fetch(`${SUPABASE_URL}/rest/v1/curated_sync_status`, {
              method: 'POST',
              headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`,
                'Content-Type': 'application/json',
                'Prefer': 'resolution=merge-duplicates'
              },
              body: JSON.stringify({
                id: 'sync-manifests',
                last_run_started_at: new Date().toISOString(),
                last_run_status: 'running',
                metadata: { mode: syncMode, total_apps: total, shards: chunks.length },
                updated_at: new Date().toISOString()
              })
            });
            if (!statusResponse.ok) {
              throw new Error(`Could not mark sync running: ${statusResponse.status} ${await statusResponse.text()}`);
            }
          }

          run().catch(err => { console.error('Plan failed:', err); process.exit(1); });
          PLANEOF

  # ── Job 2: Sync (matrix) ─────────────────────────────────────────────
  # Each shard processes a 500-app slice in parallel.
  # Shards work on non-overlapping slices so there are no DB conflicts.
  sync:
    needs: plan
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
      fail-fast: false
      max-parallel: 3

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: "Sync shard ${{ matrix.shard }}/${{ matrix.total_shards }}"
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APP_IDS: ${{ github.event.inputs.app_ids || 'all' }}
          APP_OFFSET: ${{ matrix.offset }}
          APP_LIMIT: ${{ matrix.chunk_size }}
          SYNC_MODE: ${{ github.event.inputs.mode || 'all' }}
          FORCE_REFRESH: ${{ github.event.inputs.force_refresh || 'false' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHARD: ${{ matrix.shard }}
          TOTAL_SHARDS: ${{ matrix.total_shards }}
        run: |
          node << 'EOF'
          const fs = require('fs');
          const https = require('https');
          const { createClient } = require('@supabase/supabase-js');
          const yaml = require('yaml');

          const supabaseUrl = process.env.SUPABASE_URL;
          const supabaseKey = process.env.SUPABASE_SERVICE_KEY;

          if (!supabaseUrl || !supabaseKey) {
            console.error('Supabase credentials not configured');
            process.exit(1);
          }

          const supabase = createClient(supabaseUrl, supabaseKey);
          const GITHUB_RAW_BASE = process.env.GITHUB_RAW_BASE;
          const GITHUB_TOKEN = process.env.GITHUB_TOKEN;
          const MAX_MANIFEST_BYTES = 5 * 1024 * 1024;

          function fetchUrl(url, retries = 5) {
            return new Promise((resolve, reject) => {
              const attempt = (retriesLeft) => {
                const headers = { 'User-Agent': 'IntuneGet-Manifest-Sync' };
                if (GITHUB_TOKEN && url.includes('api.github.com')) {
                  headers['Authorization'] = `token ${GITHUB_TOKEN}`;
                }
                https.get(url, { headers }, (res) => {
                  if (res.statusCode === 404) {
                    resolve(null);
                    return;
                  }
                  if (res.statusCode === 403 || res.statusCode === 429) {
                    // Use Retry-After header, cap at 30s to avoid extremely long waits
                    const retryAfter = Math.min(parseInt(res.headers['retry-after'] || '3', 10), 30);
                    if (retriesLeft > 0) {
                      res.resume();
                      setTimeout(() => attempt(retriesLeft - 1), retryAfter * 1000);
                      return;
                    }
                    // Drain response body before rejecting
                    res.resume();
                    reject(new Error(`HTTP ${res.statusCode} (rate limited, retries exhausted)`));
                    return;
                  }
                  if (res.statusCode !== 200) {
                    if (retriesLeft > 0 && res.statusCode >= 500) {
                      res.resume();
                      setTimeout(() => attempt(retriesLeft - 1), 1000);
                      return;
                    }
                    res.resume();
                    reject(new Error(`HTTP ${res.statusCode}`));
                    return;
                  }

                  let data = '';
                  let bytes = 0;
                  res.on('data', chunk => {
                    bytes += chunk.length;
                    if (bytes > MAX_MANIFEST_BYTES) {
                      res.destroy();
                      reject(new Error(`Response exceeded ${MAX_MANIFEST_BYTES} bytes`));
                      return;
                    }
                    data += chunk;
                  });
                  res.on('end', () => resolve(data));
                }).on('error', (err) => {
                  if (retriesLeft > 0) {
                    setTimeout(() => attempt(retriesLeft - 1), 1000);
                  } else {
                    reject(err);
                  }
                });
              };
              attempt(retries);
            });
          }

          function buildManifestUrl(wingetId, version, type = 'installer') {
            const parts = wingetId.split('.');
            if (parts.length < 2) return null;
            const publisher = parts[0];
            const namePath = parts.slice(1).join('/');
            const firstLetter = publisher.charAt(0).toLowerCase();
            return `${GITHUB_RAW_BASE}/${firstLetter}/${publisher}/${namePath}/${version}/${wingetId}.${type}.yaml`;
          }

          function buildVersionListUrl(wingetId) {
            const parts = wingetId.split('.');
            if (parts.length < 2) return null;
            const publisher = parts[0];
            const namePath = parts.slice(1).map(p => encodeURIComponent(p)).join('/');
            const firstLetter = publisher.charAt(0).toLowerCase();
            return `https://api.github.com/repos/microsoft/winget-pkgs/contents/manifests/${firstLetter}/${encodeURIComponent(publisher)}/${namePath}`;
          }

          let versionFetchErrors = 0;
          async function fetchVersions(wingetId) {
            const url = buildVersionListUrl(wingetId);
            if (!url) return [];
            try {
              const response = await fetchUrl(url);
              if (!response) return [];
              const dirs = JSON.parse(response);
              return dirs
                .filter(d => d.type === 'dir')
                .map(d => d.name)
                .filter(name => /^\d/.test(name))
                .filter(name => /^\d+[\d._-]*\d*$/.test(name) || name.includes('.'))
                .sort((a, b) => b.localeCompare(a, undefined, { numeric: true }));
            } catch (e) {
              versionFetchErrors++;
              // Log first few errors to help diagnose rate limiting
              if (versionFetchErrors <= 5) {
                console.error(`  [DEBUG] fetchVersions failed for ${wingetId}: ${e.message}`);
              }
              return [];
            }
          }

          async function fetchInstallerManifest(wingetId, version) {
            const url = buildManifestUrl(wingetId, version, 'installer');
            if (!url) return null;
            try {
              const content = await fetchUrl(url);
              if (!content) return null;
              return yaml.parse(content);
            } catch (e) {
              return null;
            }
          }

          function buildVersionManifestUrl(wingetId, version) {
            const parts = wingetId.split('.');
            if (parts.length < 2) return null;
            const publisher = parts[0];
            const namePath = parts.slice(1).join('/');
            const firstLetter = publisher.charAt(0).toLowerCase();
            return `${GITHUB_RAW_BASE}/${firstLetter}/${publisher}/${namePath}/${version}/${wingetId}.yaml`;
          }

          function localeText(value) {
            return typeof value === 'string' ? value.trim() : '';
          }

          function hasLocaleDescription(manifest) {
            return Boolean(manifest && (localeText(manifest.ShortDescription) || localeText(manifest.Description)));
          }

          async function fetchYamlManifest(url) {
            if (!url) return null;
            try {
              const content = await fetchUrl(url);
              if (content) return yaml.parse(content);
            } catch (e) {
              // Treat as missing; fetchUrl already retried transient failures
            }
            return null;
          }

          // en-US is preferred, but when it is absent or carries no
          // description the DefaultLocale declared in <id>.yaml is fetched
          // instead (e.g. zh-CN-only packages). Singleton manifests carry
          // the locale fields directly in <id>.yaml and are handled by the
          // same lookup.
          async function fetchLocaleManifest(wingetId, version) {
            const enUS = await fetchYamlManifest(buildManifestUrl(wingetId, version, 'locale.en-US'));
            if (hasLocaleDescription(enUS)) return enUS;

            const versionManifest = await fetchYamlManifest(buildVersionManifestUrl(wingetId, version));
            if (hasLocaleDescription(versionManifest)) return versionManifest;

            const defaultLocale = localeText(versionManifest?.DefaultLocale);
            if (defaultLocale && defaultLocale.toLowerCase() !== 'en-us') {
              const defaultManifest = await fetchYamlManifest(buildManifestUrl(wingetId, version, `locale.${defaultLocale}`));
              if (hasLocaleDescription(defaultManifest) || (defaultManifest && !enUS)) {
                return defaultManifest;
              }
            }

            return enUS;
          }

          async function syncManifests() {
            const appIds = process.env.APP_IDS;
            const appOffset = parseInt(process.env.APP_OFFSET || '0', 10);
            const chunkSize = parseInt(process.env.APP_LIMIT || '2000', 10);
            const syncMode = process.env.SYNC_MODE || 'all';
            const forceRefresh = process.env.FORCE_REFRESH === 'true';
            const shard = process.env.SHARD || '1';
            const totalShards = process.env.TOTAL_SHARDS || '1';

            let apps = [];

            if (appIds === 'all') {
              if (chunkSize === 0) {
                console.log('No apps to sync in this shard.');
                fs.writeFileSync('./sync-results.json', JSON.stringify({
                  synced: 0, failed: 0, skipped: 0, newVersions: []
                }));
                return;
              }

              // Fetch this shard's slice using .range()
              let query = supabase
                .from('curated_apps')
                .select('winget_id, latest_version, description')
                .order('popularity_rank', { ascending: true, nullsFirst: false })
                .range(appOffset, appOffset + chunkSize - 1);

              const { data, error } = await query;
              if (error) throw error;
              apps = data || [];
            } else {
              const targetIds = appIds.split(',').map(id => id.trim()).filter(Boolean);
              const { data, error } = await supabase
                .from('curated_apps')
                .select('winget_id, latest_version, description')
                .in('winget_id', targetIds);
              if (error) throw error;
              apps = data || [];
            }

            // Versions come from the trusted package index stored in curated_apps,
            // so GitHub API enumeration is only a fallback for legacy null rows.
            const batchSize = 10;
            const batchDelay = 750;
            const delay = ms => new Promise(r => setTimeout(r, ms));

            // Load existing version history up front to avoid one Supabase query
            // per app. Chunked .in() calls keep URLs below gateway limits.
            const existingVersions = new Set();
            const previousVersionByApp = new Map();
            for (let i = 0; i < apps.length; i += 100) {
              const ids = apps.slice(i, i + 100).map(app => app.winget_id);
              if (ids.length === 0) continue;
              const { data, error } = await supabase
                .from('version_history')
                .select('winget_id, version, created_at')
                .in('winget_id', ids)
                .order('created_at', { ascending: false });
              if (error) throw error;
              for (const row of data || []) {
                existingVersions.add(`${row.winget_id}\u0000${row.version}`);
                if (!previousVersionByApp.has(row.winget_id)) {
                  previousVersionByApp.set(row.winget_id, row.version);
                }
              }
            }

            console.log(`\n========================================`);
            console.log(`  Sync Winget Manifests - Shard ${shard}/${totalShards}`);
            console.log(`========================================`);
            console.log(`  Mode:          ${syncMode}`);
            console.log(`  Force refresh: ${forceRefresh}`);
            console.log(`  Offset:        ${appOffset}`);
            console.log(`  Apps in shard: ${apps.length}`);
            console.log(`  Batch size:    ${batchSize}`);
            console.log(`  Batch delay:   ${batchDelay}ms`);
            console.log(`  Authenticated: ${!!GITHUB_TOKEN}`);
            console.log(`========================================\n`);

            let synced = 0;
            let failed = 0;
            let skipped = 0;
            let healed = 0;
            let failedApps = [];
            let skippedNoVersions = 0;
            let skippedExisting = 0;
            let skippedNoManifest = 0;
            let newVersions = [];
            const startTime = Date.now();

            for (let i = 0; i < apps.length; i += batchSize) {
              const batch = apps.slice(i, i + batchSize);

              await Promise.all(batch.map(async (app) => {
                try {
                  let latestVersion = app.latest_version;
                  if (!latestVersion) {
                    const versions = await fetchVersions(app.winget_id);
                    latestVersion = versions[0];
                  }
                  if (!latestVersion) throw new Error('No latest version available from index or upstream');

                  if (syncMode === 'new_only' && previousVersionByApp.has(app.winget_id)) {
                    skipped++;
                    skippedExisting++;
                    return;
                  }

                  if (!forceRefresh && syncMode !== 'all') {
                    if (existingVersions.has(`${app.winget_id}\u0000${latestVersion}`)) {
                      // Version already synced, but heal a still-missing
                      // description (e.g. the locale fetch failed when this
                      // version was first synced) instead of waiting for the
                      // next version bump. The DB-side null filter makes the
                      // write a no-op when a description appeared meanwhile.
                      if (!localeText(app.description)) {
                        const healManifest = await fetchLocaleManifest(app.winget_id, latestVersion);
                        const healDescription = localeText(healManifest?.ShortDescription) ||
                                                localeText(healManifest?.Description);
                        if (healDescription) {
                          const { error: healError } = await supabase
                            .from('curated_apps')
                            .update({ description: healDescription, updated_at: new Date().toISOString() })
                            .eq('winget_id', app.winget_id)
                            .is('description', null);
                          if (!healError) healed++;
                        }
                      }
                      skipped++;
                      skippedExisting++;
                      return;
                    }
                  }

                  const installerManifest = await fetchInstallerManifest(app.winget_id, latestVersion);

                  if (!installerManifest) {
                    failed++;
                    skippedNoManifest++;
                    failedApps.push({ id: app.winget_id, reason: 'no installer manifest' });
                    return;
                  }

                  const localeManifest = await fetchLocaleManifest(app.winget_id, latestVersion);

                  const rawInstallers = installerManifest.Installers || [];
                  const defaultInstaller = rawInstallers[0] || {};

                  const rootType = installerManifest.InstallerType || null;
                  const rootScope = installerManifest.Scope || null;
                  const rootSwitches = installerManifest.InstallerSwitches || null;
                  const installers = rawInstallers.map(inst => ({
                    ...inst,
                    InstallerType: inst.InstallerType || rootType,
                    Scope: inst.Scope || rootScope,
                    InstallerSwitches: inst.InstallerSwitches || rootSwitches,
                  }));

                  const versionRecord = {
                    winget_id: app.winget_id,
                    version: latestVersion,
                    installer_url: defaultInstaller.InstallerUrl || null,
                    installer_sha256: defaultInstaller.InstallerSha256 || null,
                    installer_type: defaultInstaller.InstallerType ||
                                    installerManifest.InstallerType || null,
                    installer_scope: defaultInstaller.Scope ||
                                     installerManifest.Scope || null,
                    silent_args: defaultInstaller.InstallerSwitches?.Silent ||
                                 installerManifest.InstallerSwitches?.Silent ||
                                 defaultInstaller.InstallerSwitches?.SilentWithProgress ||
                                 installerManifest.InstallerSwitches?.SilentWithProgress || null,
                    installers,
                    minimum_os_version: installerManifest.MinimumOSVersion || null,
                    platform: installerManifest.Platform || null,
                    upgrade_behavior: installerManifest.UpgradeBehavior || null,
                    release_notes: localeManifest?.ReleaseNotes || null,
                    manifest_yaml: yaml.stringify(installerManifest),
                    manifest_fetched_at: new Date().toISOString(),
                    updated_at: new Date().toISOString()
                  };

                  const { error: vhError } = await supabase
                    .from('version_history')
                    .upsert(versionRecord, { onConflict: 'winget_id,version' });

                  if (vhError) {
                    console.error(`  [FAIL] ${app.winget_id}: DB upsert error - ${vhError.message}`);
                    failed++;
                    failedApps.push({ id: app.winget_id, reason: `DB: ${vhError.message}` });
                    return;
                  }

                  // Locale fields are only written when a non-empty value
                  // was extracted, so a failed locale fetch can never wipe
                  // data a previous sync already stored.
                  const curatedUpdate = {
                    latest_version: latestVersion,
                    updated_at: new Date().toISOString()
                  };
                  const localeDescription = localeText(localeManifest?.ShortDescription) ||
                                            localeText(localeManifest?.Description);
                  if (localeDescription) curatedUpdate.description = localeDescription;
                  const localeHomepage = localeText(localeManifest?.PackageUrl) ||
                                         localeText(localeManifest?.PublisherUrl);
                  if (localeHomepage) curatedUpdate.homepage = localeHomepage;
                  const localeLicense = localeText(localeManifest?.License);
                  if (localeLicense) curatedUpdate.license = localeLicense;

                  const { error: caError } = await supabase
                    .from('curated_apps')
                    .update(curatedUpdate)
                    .eq('winget_id', app.winget_id);

                  if (caError) {
                    console.error(`  [FAIL] ${app.winget_id}: curated_apps update failed - ${caError.message}`);
                    failed++;
                    failedApps.push({ id: app.winget_id, reason: `DB: ${caError.message}` });
                    return;
                  }

                  const previousVersion = previousVersionByApp.get(app.winget_id);
                  if (previousVersion && previousVersion !== latestVersion) {
                    newVersions.push({
                      winget_id: app.winget_id,
                      old_version: previousVersion,
                      new_version: latestVersion
                    });
                  }

                  synced++;
                } catch (e) {
                  failed++;
                  failedApps.push({ id: app.winget_id, reason: e.message || String(e) });
                }
              }));

              if (i + batchSize < apps.length) {
                await delay(batchDelay);
              }

              const processed = Math.min(i + batchSize, apps.length);
              if ((i / batchSize) % 5 === 0 || processed >= apps.length) {
                const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
                const rate = (processed / (Date.now() - startTime) * 1000).toFixed(1);
                console.log(`  [${elapsed}s] ${processed}/${apps.length} | synced: ${synced} | failed: ${failed} | skipped: ${skipped} (no-versions: ${skippedNoVersions}, existing: ${skippedExisting}, no-manifest: ${skippedNoManifest}) | ${rate} apps/s`);
              }
            }

            const totalTime = ((Date.now() - startTime) / 1000).toFixed(1);

            console.log(`\n========================================`);
            console.log(`  Shard ${shard}/${totalShards} Complete`);
            console.log(`========================================`);
            console.log(`  Duration:    ${totalTime}s`);
            console.log(`  Synced:      ${synced}`);
            console.log(`  Failed:      ${failed}`);
            console.log(`  Skipped:     ${skipped}`);
            console.log(`  Healed descriptions: ${healed}`);
            console.log(`    - No versions found: ${skippedNoVersions}`);
            console.log(`    - Already up to date: ${skippedExisting}`);
            console.log(`    - No manifest found:  ${skippedNoManifest}`);
            console.log(`========================================`);

            if (failedApps.length > 0) {
              console.log(`\nFailed apps (showing first 30):`);
              for (const f of failedApps.slice(0, 30)) {
                console.log(`  - ${f.id}: ${f.reason}`);
              }
              if (failedApps.length > 30) {
                console.log(`  ... and ${failedApps.length - 30} more`);
              }
            }

            if (newVersions.length > 0) {
              console.log(`\nNew versions detected:`);
              for (const v of newVersions.slice(0, 20)) {
                console.log(`  ${v.winget_id}: ${v.old_version} -> ${v.new_version}`);
              }
              if (newVersions.length > 20) {
                console.log(`  ... and ${newVersions.length - 20} more`);
              }
            }

            fs.writeFileSync('./sync-results.json', JSON.stringify({
              synced, failed, skipped, healed, newVersions
            }));
          }

          syncManifests().then(() => {
            process.exit(0);
          }).catch(err => {
            console.error('Sync failed:', err);
            // Write partial results so summary job can still aggregate
            const fs = require('fs');
            if (!require('fs').existsSync('./sync-results.json')) {
              fs.writeFileSync('./sync-results.json', JSON.stringify({
                synced: 0, failed: 1, skipped: 0, newVersions: []
              }));
            }
            process.exit(1);
          });
          EOF

      - name: Upload shard results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sync-results-shard-${{ matrix.shard }}
          path: sync-results.json
          if-no-files-found: error
          retention-days: 1

  # ── Job 3: Summary ───────────────────────────────────────────────────
  # Aggregates results from all shards and updates sync status.
  summary:
    needs: [plan, sync]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download all shard results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: sync-results-shard-*
          path: results

      - name: Aggregate results
        id: aggregate
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SYNC_MODE: ${{ github.event.inputs.mode || 'all' }}
          EXPECTED_SHARDS: ${{ needs.plan.outputs.expected_shards }}
        run: |
          node << 'SUMMARYEOF'
          const fs = require('fs');
          const path = require('path');

          const resultsDir = './results';
          const expectedShards = Number.parseInt(process.env.EXPECTED_SHARDS || '0', 10);
          let totalSynced = 0, totalFailed = 0, totalSkipped = 0, totalHealed = 0;
          let allNewVersions = [];
          let shardsFound = 0;

          if (fs.existsSync(resultsDir)) {
            const dirs = fs.readdirSync(resultsDir);
            for (const dir of dirs) {
              const filePath = path.join(resultsDir, dir, 'sync-results.json');
              if (fs.existsSync(filePath)) {
                const data = JSON.parse(fs.readFileSync(filePath, 'utf8'));
                totalSynced += data.synced || 0;
                totalFailed += data.failed || 0;
                totalSkipped += data.skipped || 0;
                totalHealed += data.healed || 0;
                allNewVersions = allNewVersions.concat(data.newVersions || []);
                shardsFound++;
              }
            }
          }

          console.log(`\n========================================`);
          console.log(`  Sync Complete (${shardsFound} shards)`);
          console.log(`========================================`);
          console.log(`  Synced:      ${totalSynced}`);
          console.log(`  Failed:      ${totalFailed}`);
          console.log(`  Skipped:     ${totalSkipped}`);
          console.log(`  Healed descriptions: ${totalHealed}`);
          console.log(`  New versions: ${allNewVersions.length}`);
          console.log(`========================================`);

          fs.writeFileSync('./aggregate-results.json', JSON.stringify({
            synced: totalSynced,
            failed: totalFailed,
            skipped: totalSkipped,
            healed: totalHealed,
            newVersions: allNewVersions
          }));

          const complete = expectedShards > 0 && shardsFound === expectedShards;
          if (!complete) {
            totalFailed += Math.max(1, expectedShards - shardsFound);
            console.error(`Incomplete sync: expected ${expectedShards} shard artifacts, found ${shardsFound}`);
          }

          // Update sync status in Supabase
          const SUPABASE_URL = process.env.SUPABASE_URL;
          const SUPABASE_KEY = process.env.SUPABASE_SERVICE_KEY;
          const syncMode = process.env.SYNC_MODE || 'all';

          async function updateStatus() {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/curated_sync_status`, {
              method: 'POST',
              headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`,
                'Content-Type': 'application/json',
                'Prefer': 'resolution=merge-duplicates'
              },
              body: JSON.stringify({
                id: 'sync-manifests',
                last_run_completed_at: new Date().toISOString(),
                last_run_status: complete && totalFailed === 0 ? 'success' : (totalSynced > 0 ? 'partial' : 'failed'),
                items_processed: totalSynced,
                error_message: totalFailed > 0 ? `${totalFailed} apps failed to sync` : null,
                metadata: {
                  mode: syncMode,
                  synced: totalSynced,
                  failed: totalFailed,
                  skipped: totalSkipped,
                  shards: shardsFound,
                  expected_shards: expectedShards,
                  new_versions: allNewVersions.length
                },
                updated_at: new Date().toISOString()
              })
            });
            if (!response.ok) {
              throw new Error(`Sync status update failed: ${response.status} ${await response.text()}`);
            }
          }

          updateStatus()
            .then(() => {
              if (!complete || totalFailed > 0) process.exit(1);
            })
            .catch(err => {
              console.error('Failed to update sync status:', err);
              process.exit(1);
            });
          SUMMARYEOF

      - name: Create summary
        run: |
          if [ -f aggregate-results.json ]; then
            SYNCED=$(jq -r '.synced' aggregate-results.json)
            FAILED=$(jq -r '.failed' aggregate-results.json)
            SKIPPED=$(jq -r '.skipped' aggregate-results.json)
            NEW_VERSIONS=$(jq -r '.newVersions | length' aggregate-results.json)

            echo "## Manifest Sync Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- **Mode:** ${{ github.event.inputs.mode || 'all' }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Synced:** $SYNCED" >> $GITHUB_STEP_SUMMARY
            echo "- **Failed:** $FAILED" >> $GITHUB_STEP_SUMMARY
            echo "- **Skipped:** $SKIPPED" >> $GITHUB_STEP_SUMMARY
            echo "- **New versions detected:** $NEW_VERSIONS" >> $GITHUB_STEP_SUMMARY

            if [ "$NEW_VERSIONS" -gt 0 ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### New Versions (first 20)" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              jq -r '.newVersions[:20][] | "- **\(.winget_id):** \(.old_version) -> \(.new_version)"' aggregate-results.json >> $GITHUB_STEP_SUMMARY
            fi
          fi

      - name: Trigger scan workflow for new versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f aggregate-results.json ]; then
            NEW_VERSIONS=$(jq -r '.newVersions | length' aggregate-results.json)

            if [ "$NEW_VERSIONS" -gt 0 ]; then
              APP_IDS=$(jq -r '[.newVersions[:10][].winget_id] | join(",")' aggregate-results.json)

              echo "Triggering scan workflow for: $APP_IDS"

              gh workflow run scan-apps.yml \
                -f app_ids="$APP_IDS" \
                -f trigger_source="sync-manifests" || echo "Scan workflow not available or failed to trigger"
            fi
          fi

  # ── Job 4: Catalog snapshot ──────────────────────────────────────────
  # After the daily sync, export the public catalog tables to a SQLite
  # snapshot and publish it on the rolling `catalog-latest` release so
  # self-hosted (Supabase-less) instances can download the catalog.
  snapshot:
    needs: [plan, sync, summary]
    if: ${{ needs.plan.result == 'success' && needs.sync.result == 'success' && needs.summary.result == 'success' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build catalog snapshot
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SNAPSHOT_OUT_DIR: ./snapshot
        run: node scripts/build-catalog-snapshot.mjs

      - name: Publish to catalog-latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view catalog-latest >/dev/null 2>&1; then
            gh release create catalog-latest \
              --title "App catalog snapshot (self-hosted)" \
              --notes "Rolling SQLite snapshot of the public IntuneGet app catalog, rebuilt daily. Self-hosted instances in DATABASE_MODE=sqlite download \`manifest.json\` then \`catalog.sqlite.gz\` (verify against the manifest sha256). Contains only public catalog data (curated apps, version/installer metadata, global SCCM mappings) - no user or tenant data." \
              --prerelease \
              --latest=false
          fi
          gh release upload catalog-latest snapshot/catalog.sqlite.gz snapshot/manifest.json --clobber

      - name: Summary
        run: |
          echo "## Catalog Snapshot Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f snapshot/manifest.json ]; then
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat snapshot/manifest.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Assets: https://github.com/${{ github.repository }}/releases/tag/catalog-latest" >> $GITHUB_STEP_SUMMARY
          fi

name: Publish Packager to npm

on:
  push:
    tags:
      - "packager-v*"
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish; must match packager/package.json
        required: true
        type: string

concurrency:
  group: npm-packager-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    outputs:
      version: ${{ steps.validate.outputs.version }}
    defaults:
      run:
        working-directory: packager
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "26.5.0"
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: packager/package-lock.json

      - name: Validate requested version
        id: validate
        env:
          INPUT_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          package_version=$(node -p "require('./package.json').version")
          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            requested=${GITHUB_REF_NAME#packager-v}
          else
            requested=$INPUT_VERSION
          fi
          if [[ ! "$requested" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version: $requested" >&2
            exit 1
          fi
          if [[ "$requested" != "$package_version" ]]; then
            echo "Requested version $requested does not match packager/package.json $package_version" >&2
            exit 1
          fi
          echo "version=$requested" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Inspect package contents
        run: npm pack --dry-run

      - name: Publish to npm with provenance
        run: npm publish --access public --provenance

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: publish
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          name: IntuneGet Packager ${{ github.ref_name }}
          body: |
            ## IntuneGet Packager ${{ github.ref_name }}

            This release publishes the matching, provenance-attested npm package.

            ```bash
            npm install -g @ugurkocde/intuneget-packager@${{ needs.publish.outputs.version }}
            ```

            See [packager/README.md](https://github.com/${{ github.repository }}/blob/main/packager/README.md) for installation, configuration, and compatibility details.
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
